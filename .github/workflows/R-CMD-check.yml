name: R Package CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install BiocManager
        run: Rscript -e "install.packages('BiocManager', repos='https://cloud.r-project.org')"

      - name: Install Bioconductor dependencies
        run: |
          Rscript -e "BiocManager::install(c(
            'limma', 'edgeR', 'NOISeq', 'RUVSeq',
            'SummarizedExperiment', 'Biobase'
          ), ask = FALSE)"

      - name: Install CRAN dependencies
        run: |
          Rscript -e "install.packages(c(
            'missForest', 'caret', 'doParallel',
            'ggplot2', 'ggfortify', 'pheatmap',
            'Rdimtools', 'ruv'
          ), repos='https://cloud.r-project.org')"

      - name: Install tcgaCleaneR (GitHub)
        run: Rscript -e "remotes::install_github('martapn13/tcgaCleaneR')"

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: rcmdcheck

      - name: Check package
        run: Rscript -e "rcmdcheck::rcmdcheck(args = '--no-manual', error_on = 'error')"
